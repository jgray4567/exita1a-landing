<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exit A1A — The Road Home</title>
    <meta
      name="description"
      content="Exit A1A — The Road Home. Clean, modern real estate intelligence platform. Coming Soon."
    />
    <style>
      :root {
        --text: #0f172a;
        --muted: #475569;
        --line: rgba(15, 23, 42, 0.12);
        --accent: #0d7ff2;
        --accent-2: #3aa1ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
          Roboto, Helvetica, Arial, sans-serif;
        color: #111827;
        background:
          radial-gradient(1000px 500px at 50% -10%, #eef3f8 0%, rgba(238, 243, 248, 0) 60%),
          linear-gradient(180deg, #ffffff 0%, #f7f9fc 100%);
      }

      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(980px, 100%);
        border: 1px solid var(--line);
        background: linear-gradient(180deg, #ffffff, #f8fafc);
        border-radius: 28px;
        box-shadow:
          0 24px 60px rgba(15, 23, 42, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.85);
        overflow: hidden;
      }

      .hero {
        padding: 56px 28px 64px;
        display: grid;
        gap: 28px;
        justify-items: center;
        text-align: center;
      }

      .sign {
        width: min(336px, 46%);
      }

      h1 {
        margin: 0;
        color: var(--text);
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1.07;
        letter-spacing: -0.03em;
        font-weight: 700;
      }

      .sub {
        margin: 0;
        font-size: clamp(1rem, 1.8vw, 1.22rem);
        color: var(--muted);
        letter-spacing: 0.01em;
      }

      .soon {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        border: 1px solid #0d7ff2;
        background: #e9f3ff;
        color: #0a3f7a;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        font-size: 0.95rem;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #5db5ff;
        box-shadow: 0 0 0 6px rgba(93, 181, 255, 0.18);
        animation: pulse 1.8s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.8;
        }
      }

      .footer {
        border-top: 1px solid var(--line);
        padding: 14px 18px;
        color: #64748b;
        font-size: 0.84rem;
        text-align: center;
      }

      @media (max-width: 640px) {
        .hero {
          padding: 40px 16px 48px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <div class="hero">
          <img class="sign" src="./A1A.png" alt="A1A highway style sign" />

          <h1>The Road Home</h1>
          <p class="sub">Exit A1A is building a cleaner route to real estate growth.</p>
          <div class="soon"><span class="dot"></span> Coming Soon</div>
        </div>

        <div class="footer">
          <div>Exit A1A • CloudTeamOne</div>
          <div>© 2026 CloudTeamOne. All rights reserved.</div>
        </div>
      </section>
    </main>
  </body>
</html>
